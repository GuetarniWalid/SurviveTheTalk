# The Cop (Paid)
# ============================================================

metadata:
  id: cop_hard_01
  title: "The Cop"
  # Story 7.1 — debrief "mission" title (distinct from the character name above).
  scenario_title: "Answer the questions"
  # Story 6.28 — hub ordering (lower = earlier; null/absent = last).
  display_order: 40
  is_free: false
  rive_character: cop
  language_focus: "answering authority questions, past tense narration, formal register"
  tts_voice_id: null  # Select a firm, authoritative male voice from Cartesia during calibration
  opening_line: "This is Sergeant Price. I've got a few questions about tonight, and I want straight answers."
  content_warning: >
    A firm officer questioning you about a traffic stop.
    He'll lean on you hard. No arrest, no detention.

  # Story 7.2 — Call Ended overlay theatrical phrases (server-side per the
  # content-is-server-side rule; editing these never requires an app update).
  end_phrases:
    hung_up: "The officer lost patience"
