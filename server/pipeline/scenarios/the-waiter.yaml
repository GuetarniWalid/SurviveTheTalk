calibration:
  # Pipeline & feel validation (pre-checkpoint system)
  # Full calibration deferred to post-Epic 6 when CheckpointManager is built
  pipeline_validation:
    date: 2026-04-15
    calls: 2
    transcript_files:
      - transcript_call_1776260510.json  # v1 — aggressive prompt, VAD too fast
      - transcript_call_1776261974.json  # v2 — tired-not-angry prompt, VAD tuned
    findings:
      - "Prompt v1 too aggressive — Tina escalated without provocation. Fixed: tired-by-default, sarcasm only when provoked."
      - "Turn-taking cascade — stop_secs 0.3→0.8, user_speech_timeout 0.6→1.8 fixed interruption loops."
      - "Opening line 'worst restaurant' unrealistic — changed to neutral professional greeting."
      - "Character stays in role, follows easy difficulty guidelines, handles edge cases (off-menu requests) gracefully."
    verdict: pipeline-validated  # feel OK, full calibration needs checkpoint system
