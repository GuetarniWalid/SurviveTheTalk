  title: "The Mugger"
  # Story 7.1 — debrief "mission" title (distinct from the character name above).
  scenario_title: "Give me your wallet"
  # Story 6.28 — hub ordering (lower = earlier; null/absent = last).
  display_order: 30
  is_free: true
  rive_character: mugger
  language_focus: "refusing demands, asking for clarification, describing financial situation"
